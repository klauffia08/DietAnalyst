services:
  mysql:
    image: mysql:8.4
    container_name: dietanalyst-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dietanalyst
      MYSQL_USER: dietanalyst
      MYSQL_PASSWORD: dietanalyst
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dietanalyst_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dietanalyst_mysql_data:
