<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Dziennik zdarzeń')}"></head><body><div class="shell"><aside th:replace="~{fragments :: sidebar('audit')}"></aside><main class="content"><div class="topbar"><div><h1>Dziennik zdarzeń</h1><p class="muted">Ostatnie 100 operacji wykonanych w aplikacji.</p></div></div><section class="card"><table><thead><tr><th>Czas</th><th>Użytkownik</th><th>Akcja</th><th>Szczegóły</th></tr></thead><tbody><tr th:each="l:${logs}"><td th:text="${#temporals.format(l.eventTime,'dd.MM.yyyy HH:mm:ss')}"></td><td th:text="${l.actorEmail}"></td><td th:text="${l.action}"></td><td th:text="${l.details}"></td></tr></tbody></table></section></main></div></body></html>
