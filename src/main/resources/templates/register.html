<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Rejestracja')}"></head>
<body><main class="auth"><section class="auth-card"><div class="brand" style="color:#0f172a"><small>Nowe konto</small>DietAnalyst</div><h1>Rejestracja użytkownika</h1><p class="muted">Nowe konto otrzyma rolę Użytkownik. Role uprzywilejowane nadaje administrator.</p>
<div class="alert error" th:if="${error}" th:text="${error}"></div><form th:action="@{/register}" th:object="${form}" method="post"><div class="form-group"><label>Imię i nazwisko</label><input th:field="*{name}"><small th:errors="*{name}" style="color:#dc2626"></small></div><div class="form-group"><label>E-mail</label><input th:field="*{email}" type="email"><small th:errors="*{email}" style="color:#dc2626"></small></div><div class="form-group"><label>Hasło</label><input th:field="*{password}" type="password"><small th:errors="*{password}" style="color:#dc2626"></small></div><button class="btn btn-green" style="width:100%">Utwórz konto</button></form><p style="text-align:center;margin-top:18px"><a th:href="@{/login}" style="color:#2563eb;font-weight:800">Wróć do logowania</a></p></section></main></body></html>
