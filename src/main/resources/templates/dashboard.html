<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Pulpit')}"></head><body><div class="shell"><aside th:replace="~{fragments :: sidebar('dashboard')}"></aside><main class="content"><div class="topbar"><div><h1>Pulpit DietAnalyst</h1><p class="muted">Podsumowanie bieżącego dnia i dostępnych funkcji.</p></div><a class="btn btn-green" th:href="@{/meals}">Dodaj posiłek</a></div><div class="grid grid-4"><div class="card metric"><span>Kalorie</span><b th:text="${summary.kcal}">0</b><span th:text="'Cel: ' + ${summary.target} + ' kcal'">Cel</span></div><div class="card metric"><span>Białko</span><b th:text="${summary.protein} + ' g'">0</b></div><div class="card metric"><span>Węglowodany</span><b th:text="${summary.carbs} + ' g'">0</b></div><div class="card metric"><span>Tłuszcze</span><b th:text="${summary.fat} + ' g'">0</b></div></div><div class="grid grid-2" style="margin-top:18px"><section class="card"><h2>Realizacja celu</h2><div style="height:18px;background:#e2e8f0;border-radius:999px;overflow:hidden"><div th:style="'height:100%;width:'+${summary.progress()}+'%;background:#22c55e'"></div></div><p class="muted" th:text="${summary.progress()} + '% dziennego celu kalorycznego'">0%</p></section><section class="card"><h2>Przypisany dietetyk</h2><p th:if="${currentUser.assignedDietitian != null}" th:text="${currentUser.assignedDietitian.name} + ' • ' + ${currentUser.assignedDietitian.email}"></p><p class="muted" th:if="${currentUser.assignedDietitian == null}">Brak przypisanego dietetyka. Administrator może przypisać specjalistę.</p></section></div></main></div></body></html>
