<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Dziennik posiłków')}"></head><body><div class="shell"><aside th:replace="~{fragments :: sidebar('meals')}"></aside><main class="content"><div th:replace="~{fragments :: flash}"></div><div class="topbar"><div><h1>Dziennik posiłków</h1><p class="muted">Dodawaj posiłki i kontroluj własną historię żywieniową.</p></div></div><div class="grid grid-2"><section class="card"><h2>Dodaj posiłek</h2><form th:action="@{/meals/add}" th:object="${form}" method="post"><div class="form-group"><label>Produkt</label><select th:field="*{productId}"><option value="">Wybierz produkt</option><option th:each="p:${products}" th:value="${p.id}" th:text="${p.name}+' ('+${p.kcal}+' kcal/100 g)'"></option></select></div><div class="form-row"><div class="form-group"><label>Rodzaj</label><select th:field="*{type}"><option th:each="t:${types}" th:value="${t}" th:text="${t.label}"></option></select></div><div class="form-group"><label>Ilość [g]</label><input th:field="*{grams}" type="number" step="1"></div></div><div class="form-group"><label>Data</label><input th:field="*{date}" type="date"></div><button class="btn btn-green">Dodaj do dziennika</button></form></section><section class="card"><h2>Historia</h2><div style="overflow:auto"><table><thead><tr><th>Data</th><th>Typ</th><th>Produkt</th><th>Ilość</th><th>Kcal</th><th></th></tr></thead><tbody><tr th:each="m:${meals}"><td th:text="${m.date}"></td><td th:text="${m.type.label}"></td><td th:text="${m.product.name}"></td><td th:text="${m.grams}+' g'"></td><td th:text="${m.kcal}"></td><td><form th:action="@{'/meals/'+${m.id}+'/delete'}" method="post"><button class="btn btn-red">Usuń</button></form></td></tr><tr th:if="${#lists.isEmpty(meals)}"><td colspan="6" class="muted">Brak wpisów.</td></tr></tbody></table></div></section></div></main></div></body></html>
