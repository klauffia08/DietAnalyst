<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Profil')}"></head><body><div class="shell"><aside th:replace="~{fragments :: sidebar('profile')}"></aside><main class="content"><div th:replace="~{fragments :: flash}"></div><section class="card" style="max-width:850px"><h1>Profil użytkownika</h1><p class="muted">Dane używane podczas generowania planu i raportów.</p><div class="alert error" th:if="${error}" th:text="${error}"></div><form th:action="@{/profile}" th:object="${form}" method="post"><div class="form-row"><div class="form-group"><label>Imię i nazwisko</label><input th:field="*{name}"></div><div class="form-group"><label>E-mail</label><input th:field="*{email}" type="email" readonly title="Zmiana adresu e-mail wymaga ponownej weryfikacji konta"></div></div><div class="form-row"><div class="form-group"><label>Wiek</label><input th:field="*{age}" type="number"></div><div class="form-group"><label>Cel kaloryczny</label><input th:field="*{caloriesTarget}" type="number"></div></div><div class="form-row"><div class="form-group"><label>Cel żywieniowy</label><input th:field="*{goal}"></div><div class="form-group"><label>Aktywność</label><input th:field="*{activity}"></div></div><div class="form-group"><label>Preferencje i uwagi</label><textarea th:field="*{notes}" rows="5"></textarea></div><button class="btn btn-green">Zapisz profil</button></form></section></main></div></body></html>
