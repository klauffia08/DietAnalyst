<!DOCTYPE html><html lang="pl" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments :: head('Plan diety')}"></head><body><div class="shell"><aside th:replace="~{fragments :: sidebar('plans')}"></aside><main class="content"><div th:replace="~{fragments :: flash}"></div><div class="topbar"><div><h1>Plan diety</h1><p class="muted">Generowanie planu na podstawie profilu i wspólnej bazy produktów.</p></div><form th:action="@{/plans/generate}" method="post"><button class="btn btn-green">Wygeneruj plan</button></form></div><section class="card" th:each="p:${plans}" style="margin-bottom:18px"><div class="topbar"><div><h2 th:text="${p.name}"></h2><span class="badge" th:classappend="${p.status.name()=='APPROVED'}?'green':(${p.status.name()=='REJECTED'}?'red':'')" th:text="${p.status.label}"></span><p class="muted" th:text="${#temporals.format(p.createdAt,'dd.MM.yyyy HH:mm')}"></p></div><div><form th:if="${p.status.name()=='GENERATED' or p.status.name()=='REJECTED'}" th:action="@{'/plans/'+${p.id}+'/submit'}" method="post" style="display:inline"><button class="btn btn-blue">Wyślij do dietetyka</button></form> <form th:action="@{'/plans/'+${p.id}+'/archive'}" method="post" style="display:inline"><button class="btn btn-light">Archiwizuj</button></form></div></div><div class="pre" th:text="${p.content}"></div><div class="alert" th:if="${p.dietitianNote != null and !p.dietitianNote.isBlank()}" th:text="'Komentarz dietetyka: '+${p.dietitianNote}"></div></section><section class="card" th:if="${#lists.isEmpty(plans)}"><p class="muted">Nie wygenerowano jeszcze żadnego planu.</p></section></main></div></body></html>
